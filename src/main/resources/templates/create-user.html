<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create User</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" />
</head>
<body>
<div th:insert="fragments/navbar :: navbar"></div>
<div class="container">
    <h3>Create New User</h3>
    <form th:action="@{/api/v1/demo/users}" method="post">
        <div class="mb-3"><label>Username</label><input class="form-control" name="username" required></div>
        <div class="mb-3"><label>Email</label><input class="form-control" name="emailAddress" required></div>
        <div class="mb-3"><label>Street Address</label><input class="form-control" name="streetAddress"></div>
        <div class="mb-3"><label>City</label><input class="form-control" name="city"></div>
        <div class="mb-3"><label>State</label><input class="form-control" name="state"></div>
        <div class="mb-3"><label>Zip Code</label><input class="form-control" name="zipCode"></div>
        <button type="submit" class="btn btn-success">Create User</button>
    </form>
</div>
</body>
</html>
